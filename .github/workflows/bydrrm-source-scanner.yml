name: BYDRRM Official Source Scanner

on:
  schedule:
    # Runs every hour at minute 17.
    # GitHub cron uses UTC, but minute :17 is also :17 in Philippine time.
    - cron: "17 * * * *"

  workflow_dispatch:
    inputs:
      include_current:
        description: "Create recommendations from current matching posts (use only for testing)"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: bydrrm-source-scanner
  cancel-in-progress: false

jobs:
  scan:
    name: Scan official websites and feeds
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      INCLUDE_CURRENT: ${{ github.event_name == 'workflow_dispatch' && inputs.include_current || false }}

    steps:
      - name: Validate Firebase secret
        shell: bash
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Missing repository secret FIREBASE_SERVICE_ACCOUNT"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install scanner dependencies
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/bydrrm-scanner"
          cd "$RUNNER_TEMP/bydrrm-scanner"
          npm init -y >/dev/null 2>&1
          npm install firebase-admin@latest cheerio@latest --no-audit --no-fund

      - name: Run BYDRRM source scanner
        shell: bash
        run: |
          cd "$RUNNER_TEMP/bydrrm-scanner"

          cat > scanner.cjs <<'NODE'
          "use strict";

          const { initializeApp, cert } = require("firebase-admin/app");
          const { getFirestore, FieldValue } = require("firebase-admin/firestore");
          const cheerio = require("cheerio");
          const crypto = require("node:crypto");

          const serviceAccountJson = process.env.FIREBASE_SERVICE_ACCOUNT;

          if (!serviceAccountJson) {
            throw new Error("FIREBASE_SERVICE_ACCOUNT is missing.");
          }

          let serviceAccount;

          try {
            serviceAccount = JSON.parse(serviceAccountJson);
          } catch (error) {
            throw new Error("FIREBASE_SERVICE_ACCOUNT is not valid JSON.");
          }

          initializeApp({
            credential: cert(serviceAccount)
          });

          const db = getFirestore();

          const INCLUDE_CURRENT =
            String(process.env.INCLUDE_CURRENT).toLowerCase() === "true";

          const MAX_KNOWN_HASHES = 120;
          const MAX_ENTRIES_PER_SOURCE = 24;
          const FETCH_TIMEOUT_MS = 25000;

          const SUSPENSION_TERMS = [
            "class suspension",
            "suspension of classes",
            "classes are suspended",
            "classes will be suspended",
            "no classes",
            "walang pasok",
            "suspendido ang klase",
            "suspension ng klase",
            "suspensyon ng klase",
            "face-to-face classes are suspended",
            "onsite classes are suspended"
          ];

          function normalizeText(value) {
            return String(value || "")
              .normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "")
              .toLowerCase()
              .replace(/&/g, " and ")
              .replace(/[^a-z0-9]+/g, " ")
              .replace(/\s+/g, " ")
              .trim();
          }

          function containsSuspensionLanguage(text) {
            const normalized = normalizeText(text);

            return SUSPENSION_TERMS.some((term) =>
              normalized.includes(normalizeText(term))
            );
          }

          function detectCategory(text) {
            const value = normalizeText(text);
            const has = (pattern) => pattern.test(value);

            const both = has(
              /public and private|both public and private|public private|pampubliko at pribado|publiko at pribado/
            );

            const publicOnly = has(
              /public schools? only|public school only|pampublikong paaralan lamang|public only/
            );

            const allLevels = has(
              /all levels|all grade levels|lahat ng antas|lahat ng level|kindergarten to college|kinder to college|preschool to college/
            );

            const upToShs = has(
              /up to senior high|until senior high|elementary to senior high|kindergarten to grade 12|kinder to grade 12|preschool to grade 12|senior high school/
            );

            const upToElem = has(
              /up to elementary|until elementary|preschool to elementary|kindergarten to grade 6|kinder to grade 6|elementary level/
            );

            const governmentWork = has(
              /government work|work in government offices|government offices|pasok sa mga tanggapan ng pamahalaan|trabaho sa gobyerno/
            );

            if (
              governmentWork &&
              containsSuspensionLanguage(value)
            ) {
              return "classes-work";
            }

            if (allLevels && both) {
              return "all-both";
            }

            if (allLevels && publicOnly) {
              return "all-public";
            }

            if (upToShs && both) {
              return "shs-both";
            }

            if (upToShs && publicOnly) {
              return "shs-public";
            }

            if (upToElem && both) {
              return "elem-both";
            }

            if (upToElem && publicOnly) {
              return "elem-public";
            }

            return "custom";
          }

          function confidenceFor(category, text) {
            const length = normalizeText(text).length;

            if (
              category !== "custom" &&
              length >= 70
            ) {
              return "High";
            }

            if (
              category !== "custom" ||
              length >= 45
            ) {
              return "Medium";
            }

            return "Low";
          }

          function sha256(value) {
            return crypto
              .createHash("sha256")
              .update(String(value))
              .digest("hex");
          }

          function absoluteUrl(base, href) {
            try {
              return new URL(
                href || base,
                base
              ).toString();
            } catch {
              return base;
            }
          }

          function uniqueEntries(entries) {
            const seen = new Set();
            const result = [];

            for (const entry of entries) {
              const key = sha256(
                `${normalizeText(entry.text)}|${entry.link || ""}`
              );

              if (seen.has(key)) {
                continue;
              }

              seen.add(key);
              result.push(entry);

              if (
                result.length >= MAX_ENTRIES_PER_SOURCE
              ) {
                break;
              }
            }

            return result;
          }

          function parseFeed(raw, baseUrl) {
            const $ = cheerio.load(raw, {
              xmlMode: true
            });

            const entries = [];

            $("item, entry")
              .slice(0, MAX_ENTRIES_PER_SOURCE)
              .each((_, element) => {
                const node = $(element);

                const title = node
                  .find("title")
                  .first()
                  .text()
                  .trim();

                const description = node
                  .find(
                    "description, summary, content, content\\:encoded"
                  )
                  .first()
                  .text()
                  .trim();

                const linkNode = node
                  .find("link")
                  .first();

                const href =
                  linkNode.attr("href") ||
                  linkNode.text().trim();

                const published = node
                  .find(
                    "pubDate, published, updated"
                  )
                  .first()
                  .text()
                  .trim();

                const text = `${title}\n${description}`
                  .replace(/\s+/g, " ")
                  .trim();

                if (text.length >= 25) {
                  entries.push({
                    title,
                    text,
                    link: absoluteUrl(
                      baseUrl,
                      href
                    ),
                    published
                  });
                }
              });

            return uniqueEntries(entries);
          }

          function parseWebsite(raw, source) {
            const $ = cheerio.load(raw);

            $(
              "script, style, noscript, svg, iframe"
            ).remove();

            const selectedRoot = source.selector
              ? $(source.selector).first()
              : null;

            const root =
              selectedRoot &&
              selectedRoot.length
                ? selectedRoot
                : $("main").first().length
                  ? $("main").first()
                  : $("body");

            const entries = [];

            const selectors = [
              "article",
              ".post",
              ".news-item",
              ".news",
              ".entry",
              ".announcement",
              ".advisory",
              ".card",
              ".blog-post",
              ".item",
              "li"
            ].join(",");

            root
              .find(selectors)
              .slice(0, 80)
              .each((_, element) => {
                const node = $(element);

                const text = node
                  .text()
                  .replace(/\s+/g, " ")
                  .trim();

                if (
                  text.length < 35 ||
                  !containsSuspensionLanguage(text)
                ) {
                  return;
                }

                const title = node
                  .find(
                    "h1,h2,h3,h4,h5,strong"
                  )
                  .first()
                  .text()
                  .replace(/\s+/g, " ")
                  .trim();

                const href = node
                  .find("a[href]")
                  .first()
                  .attr("href");

                entries.push({
                  title,
                  text: text.slice(0, 2200),
                  link: absoluteUrl(
                    source.url,
                    href
                  ),
                  published: ""
                });
              });

            if (!entries.length) {
              root
                .find("p, div")
                .slice(0, 400)
                .each((_, element) => {
                  const node = $(element);

                  const text = node
                    .clone()
                    .children()
                    .remove()
                    .end()
                    .text()
                    .replace(/\s+/g, " ")
                    .trim();

                  if (
                    text.length < 35 ||
                    text.length > 2200 ||
                    !containsSuspensionLanguage(text)
                  ) {
                    return;
                  }

                  const parent = node.closest(
                    "article, section, .post, .news, .entry, .card"
                  );

                  const context = parent.length
                    ? parent
                        .text()
                        .replace(/\s+/g, " ")
                        .trim()
                    : text;

                  const href = (
                    parent.length
                      ? parent
                      : node
                  )
                    .find("a[href]")
                    .first()
                    .attr("href");

                  entries.push({
                    title: (
                      parent.length
                        ? parent
                        : node
                    )
                      .find(
                        "h1,h2,h3,h4,strong"
                      )
                      .first()
                      .text()
                      .trim(),

                    text: context.slice(
                      0,
                      2200
                    ),

                    link: absoluteUrl(
                      source.url,
                      href
                    ),

                    published: ""
                  });
                });
            }

            return uniqueEntries(entries);
          }

          async function fetchSource(source) {
            if (source.type === "facebook") {
              return {
                skipped: true,
                reason: "meta_api_required",
                entries: []
              };
            }

            const controller =
              new AbortController();

            const timeout = setTimeout(
              () => controller.abort(),
              FETCH_TIMEOUT_MS
            );

            try {
              const response = await fetch(
                source.url,
                {
                  signal: controller.signal,
                  redirect: "follow",

                  headers: {
                    "user-agent":
                      "BYDRRM-Studio-Monitor/6.1 (+official public-information monitoring)",

                    accept:
                      "text/html,application/rss+xml,application/atom+xml,application/xml;q=0.9,*/*;q=0.8",

                    "accept-language":
                      "en-PH,en;q=0.9,fil;q=0.8"
                  }
                }
              );

              if (!response.ok) {
                throw new Error(
                  `HTTP ${response.status}`
                );
              }

              const raw = await response.text();

              const entries =
                source.type === "rss"
                  ? parseFeed(
                      raw,
                      source.url
                    )
                  : parseWebsite(
                      raw,
                      source
                    );

              return {
                skipped: false,
                entries
              };
            } finally {
              clearTimeout(timeout);
            }
          }

          async function createRecommendation(
            source,
            entry,
            contentHash
          ) {
            const ref = db
              .collection("recommendations")
              .doc(contentHash);

            const existing = await ref.get();

            if (existing.exists) {
              return false;
            }

            const category =
              detectCategory(entry.text);

            await ref.set({
              municipality:
                source.municipality,

              category,

              confidence:
                confidenceFor(
                  category,
                  entry.text
                ),

              sourceId:
                source.id,

              sourceName:
                source.name ||
                source.municipality,

              sourceType:
                source.type,

              sourceUrl:
                entry.link ||
                source.url,

              excerpt:
                entry.text.slice(
                  0,
                  1000
                ),

              publishedText:
                entry.published || "",

              contentHash,

              status: "pending",

              scanner:
                "github-actions",

              createdAt:
                FieldValue.serverTimestamp()
            });

            return true;
          }

          async function updateSystemStatus(
            data
          ) {
            await db
              .collection("system_status")
              .doc("source_scanner")
              .set(
                data,
                {
                  merge: true
                }
              );
          }

          async function scanSources() {
            const startedAt = new Date();

            await updateSystemStatus({
              running: true,

              triggeredBy:
                process.env.GITHUB_EVENT_NAME ||
                "github-actions",

              platform:
                "github-actions",

              startedAt:
                FieldValue.serverTimestamp()
            });

            const snapshot = await db
              .collection("source_registry")
              .where(
                "active",
                "==",
                true
              )
              .get();

            let checked = 0;
            let recommendationsCreated = 0;
            let facebookSkipped = 0;
            let failed = 0;
            let baselined = 0;

            const errors = [];

            for (
              const sourceDoc of snapshot.docs
            ) {
              const source = {
                id: sourceDoc.id,
                ...sourceDoc.data()
              };

              try {
                const result =
                  await fetchSource(source);

                if (result.skipped) {
                  facebookSkipped += 1;

                  await sourceDoc.ref.set(
                    {
                      lastCheckAt:
                        FieldValue.serverTimestamp(),

                      lastCheckStatus:
                        result.reason,

                      scanner:
                        "github-actions"
                    },

                    {
                      merge: true
                    }
                  );

                  continue;
                }

                checked += 1;

                const matching =
                  result.entries.filter(
                    (entry) =>
                      containsSuspensionLanguage(
                        entry.text
                      )
                  );

                const currentHashes =
                  matching.map((entry) =>
                    sha256(
                      `${source.id}|${normalizeText(
                        entry.text
                      )}|${entry.link || ""}`
                    )
                  );

                const knownHashes =
                  Array.isArray(
                    source.knownHashes
                  )
                    ? source.knownHashes
                    : [];

                const knownSet =
                  new Set(knownHashes);

                const firstBaseline =
                  source.baselineComplete !==
                  true;

                let newForSource = 0;

                for (
                  let index = 0;
                  index < matching.length;
                  index += 1
                ) {
                  const entry =
                    matching[index];

                  const contentHash =
                    currentHashes[index];

                  const isUnseen =
                    !knownSet.has(
                      contentHash
                    );

                  const shouldCreate =
                    isUnseen &&
                    (
                      !firstBaseline ||
                      INCLUDE_CURRENT
                    );

                  if (
                    shouldCreate &&
                    (
                      await createRecommendation(
                        source,
                        entry,
                        contentHash
                      )
                    )
                  ) {
                    recommendationsCreated += 1;
                    newForSource += 1;
                  }
                }

                if (firstBaseline) {
                  baselined += 1;
                }

                const mergedHashes = [
                  ...new Set([
                    ...currentHashes,
                    ...knownHashes
                  ])
                ].slice(
                  0,
                  MAX_KNOWN_HASHES
                );

                await sourceDoc.ref.set(
                  {
                    baselineComplete: true,

                    knownHashes:
                      mergedHashes,

                    lastCheckAt:
                      FieldValue.serverTimestamp(),

                    lastCheckStatus:
                      "ok",

                    lastEntryCount:
                      result.entries.length,

                    lastMatchCount:
                      matching.length,

                    lastNewCount:
                      newForSource,

                    lastError:
                      FieldValue.delete(),

                    scanner:
                      "github-actions"
                  },

                  {
                    merge: true
                  }
                );
              } catch (error) {
                failed += 1;

                const message =
                  error &&
                  error.message
                    ? error.message
                    : String(error);

                console.error(
                  `Source check failed: ${source.id}: ${message}`
                );

                errors.push({
                  sourceId:
                    source.id,

                  message:
                    message.slice(
                      0,
                      300
                    )
                });

                await sourceDoc.ref.set(
                  {
                    lastCheckAt:
                      FieldValue.serverTimestamp(),

                    lastCheckStatus:
                      "error",

                    lastError:
                      message.slice(
                        0,
                        500
                      ),

                    scanner:
                      "github-actions"
                  },

                  {
                    merge: true
                  }
                );
              }
            }

            const summary = {
              running: false,

              platform:
                "github-actions",

              triggeredBy:
                process.env.GITHUB_EVENT_NAME ||
                "github-actions",

              checked,

              recommendationsCreated,

              facebookSkipped,

              failed,

              baselined,

              durationMs:
                Date.now() -
                startedAt.getTime(),

              completedAt:
                FieldValue.serverTimestamp()
            };

            await updateSystemStatus(
              summary
            );

            await db
              .collection(
                "source_check_logs"
              )
              .add({
                ...summary,
                errors
              });

            console.log(
              JSON.stringify(
                {
                  success: true,

                  checked,

                  recommendationsCreated,

                  facebookSkipped,

                  failed,

                  baselined,

                  includeCurrent:
                    INCLUDE_CURRENT
                },

                null,
                2
              )
            );

            if (
              failed > 0 &&
              checked === 0
            ) {
              process.exitCode = 1;
            }
          }

          scanSources().catch(
            async (error) => {
              console.error(error);

              try {
                await updateSystemStatus({
                  running: false,

                  platform:
                    "github-actions",

                  lastFatalError:
                    String(
                      error &&
                      error.message
                        ? error.message
                        : error
                    ).slice(
                      0,
                      800
                    ),

                  completedAt:
                    FieldValue.serverTimestamp()
                });
              } catch {}

              process.exitCode = 1;
            }
          );
          NODE

          GITHUB_EVENT_NAME="${{ github.event_name }}" node scanner.cjs
